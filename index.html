<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;padding:8px;min-height:100vh;-webkit-tap-highlight-color:transparent}
.header{text-align:center;margin-bottom:12px}

.section{margin-bottom:12px}

.heat-grid{display:flex;gap:6px;flex-wrap:wrap}
.heat-card{flex:1;min-width:calc(33%-6px);background:#161b22;border-radius:8px;padding:10px;border-left:3px solid}
.concept-name{font-size:13px;font-weight:600;margin-bottom:1px}
.concept-meta{font-size:10px;color:#8b949e;display:flex;justify-content:space-between}
.heat-bar{height:4px;background:#30363d;border-radius:2px;margin-top:4px;overflow:hidden}
.heat-fill{height:100%;border-radius:2px}
.tag{font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px}
.tag-new{background:#da3633;color:#fff}
/* Table */
table{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
th{text-align:left;padding:6px 4px;color:#8b949e;font-weight:500;border-bottom:1px solid #21262d;font-size:10px}
td{padding:5px 4px;border-bottom:1px solid #161b22}
tr:hover td{background:#1c2129}
.row-header td{background:#161b22!important;color:#58a6ff;font-size:11px;font-weight:600;padding:8px 4px}
.score{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;min-width:40px;text-align:center}
.s90{background:#238636;color:#fff}.s80{background:#2ea043;color:#fff}.s70{background:#3fb950;color:#000}
.s60{background:#d29922;color:#000}.s50{background:#9e6a03;color:#fff}
.up{color:#3fb950}.down{color:#f85149}.dim{color:#8b949e;font-size:10px}
/* Buttons */
.btns{display:flex;gap:6px;justify-content:center;margin:12px 0}
.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer}
.btn:active{background:#30363d}
.btn-on{background:#238636;border-color:#238636;color:#fff}
.footer{text-align:center;font-size:9px;color:#484f58;margin-top:12px;padding:8px}
</style>

  (c.st||[]).forEach(function(s){
    if(Math.abs(s.q5)>=7) alerts.push({t:s.nm+' '+s.q5.toFixed(1)+'% '+s.lo,ts:hh()});
    tb.innerHTML+='<tr onclick="openChart(''+s.cd+'',''+s.nm+'')" style="cursor:pointer"'+
      '<td><b>'+s.nm+'</b> <span class="dim">'+s.cd+'</span></td>'+
      '<td><span class="score '+sc(s.s)+'">'+s.s+' '+s.lv+'</span></td>'+
      '<td>'+s.p.toFixed(2)+'</td>'+
      '<td class="'+c5(s.q5)+'">'+(s.q5>0?'+':'')+s.q5.toFixed(1)+'%</td>'+
      '<td class="'+c5(s.q20)+'">'+(s.q20>0?'+':'')+s.q20.toFixed(1)+'%</td>'+
      '<td>'+s.vr+'x</td>'+
      '<td class="dim">'+s.al+'</td></tr>';
  });
});

// Alerts
if(alerts.length>0){
  var aa=document.getElementById('alerts-area');
  aa.innerHTML='<div class="section"><div class="section-title">🔔 高波动提醒</div>';
  alerts.forEach(function(a){aa.innerHTML+='<div style="font-size:10px;padding:2px 0;color:#f85149">⚠️ '+a.t+'</div>'});
  aa.innerHTML+='</div>';
  if(alerts.length>2) speak('多只标的异动，请注意');
}
</script>
<style>
.chart-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.88);z-index:999;display:flex;align-items:center;justify-content:center}
.chart-box{background:#0d1117;border:1px solid #30363d;border-radius:12px;padding:10px;width:96%;max-width:500px;max-height:88vh;overflow-y:auto}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.chart-header h3{color:#58a6ff;font-size:14px;margin:0}
.chart-close{color:#8b949e;font-size:22px;cursor:pointer;padding:0 8px;line-height:1}
.chart-info{font-size:9px;color:#8b949e;margin-bottom:2px}
.chart-legend{font-size:9px;margin-top:2px;display:flex;gap:10px}
</style>
<script>
var chartOpen=false;
function openChart(code,name){
  if(chartOpen)return;
  var kl=KL[code];if(!kl)return;
  chartOpen=true;
  var cs=kl.map(function(r){return r[2]});
  function ma(a,n){var s=0,c=0;for(var i=Math.max(0,a.length-n);i<a.length;i++){s+=a[i];c++}return c?s/c:0}
  var ma5=[],ma10=[],ma20=[];
  for(var i=0;i<cs.length;i++){ma5.push(ma(cs.slice(0,i+1),5));ma10.push(ma(cs.slice(0,i+1),10));ma20.push(ma(cs.slice(0,i+1),20))}
  var W=500,H=270,PL=48,PR=12,PT=18,PB=28,CW=W-PL-PR,CH=H-PT-PB;
  var hi=0,lo=1e9,mxv=0;
  kl.forEach(function(r){if(r[3]>hi)hi=r[3];if(r[4]<lo)lo=r[4];if(r[5]>mxv)mxv=r[5]});
  hi*=1.02;lo*=0.98;var rg=hi-lo;
  function px(i){return PL+i*CW/(kl.length-1)}
  function py(p){return PT+(hi-p)/rg*CH}

  var s='<svg width="'+W+'" height="'+H+'">';
  for(var i=0;i<=4;i++){var y=PT+i*CH/4;var pr=(hi-i*rg/4).toFixed(1);s+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#21262d" stroke-width=".5"/>';s+='<text x="'+(PL-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="8" fill="#8b949e">'+pr+'</text>'}
  for(var i=0;i<kl.length;i++){
    var r=kl[i],x=px(i),o=py(r[1]),c=py(r[2]),h=py(r[3]),l=py(r[4]);
    var cl=r[2]>=r[1]?'#3fb950':'#f85149';
    s+='<line x1="'+x+'" y1="'+h+'" x2="'+x+'" y2="'+l+'" stroke="'+cl+'"/>';
    var bw=Math.max(1.2,CW/kl.length*.7);
    var bh=Math.abs(c-o)||1,by=Math.min(c,o);
    s+='<rect x="'+(x-bw/2)+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+cl+'"/>';
    if(i%5===0)s+='<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>';
  }
  function dm(v,c){var d='';for(var i=0;i<v.length;i++){if(v[i]===0)continue;var pp=py(v[i]);d+=(i===0?'M':'L')+px(i)+' '+pp}if(d)s+='<path d="'+d+'" fill="none" stroke="'+c+'" stroke-width="1.2"/>'}
  dm(ma5,'#ff6b35');dm(ma10,'#ffa502');dm(ma20,'#1e90ff');
  s+='<text x="'+(W-PR-10)+'" y="12" font-size="8" fill="#ff6b35">MA5</text><text x="'+(W-PR-38)+'" y="12" font-size="8" fill="#ffa502">MA10</text><text x="'+(W-PR-68)+'" y="12" font-size="8" fill="#1e90ff">MA20</text>';
  s+='</svg>';

  var VH=55;mxv=mxv||1;
  s+='<svg width="'+W+'" height="'+VH+'">';
  for(var i=0;i<kl.length;i++){
    var r=kl[i],vh=r[5]/mxv*(VH-8);
    var vc=r[2]>=r[1]?'#3fb95044':'#f8514944';
    var bw=Math.max(1.2,CW/kl.length*.7);
    s+='<rect x="'+(px(i)-bw/2)+'" y="'+(VH-vh-4)+'" width="'+bw+'" height="'+vh+'" fill="'+vc+'"/>';
  }
  s+='</svg>';

  var d=document.createElement('div');d.className='chart-overlay';
  d.innerHTML='<div class="chart-box"><div class="chart-header"><h3>'+name+' '+code+'</h3><span class="chart-close" onclick="this.parentElement.parentElement.parentElement.remove();chartOpen=false">&times;</span></div><div class="chart-info">日K线 | 近'+kl.length+'交易日 | MA5/10/20</div><div class="chart-legend"><span style="color:#3fb950">■ 阳线</span><span style="color:#f85149">■ 阴线</span><span style="color:#8b949e">▽ 成交量</span></div>'+s+'</div>';
  d.onclick=function(e){if(e.target===this){this.remove();chartOpen=false}};
  document.body.appendChild(d);
}
</script>
