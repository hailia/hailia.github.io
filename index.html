    ctx.fillStyle=d[i][1]>=ap?'rgba(38,166,65,0.5)':'rgba(229,83,75,0.5)';
    ctx.fillRect(x-bw/2,pad.t+pH+vH-vh,bw,Math.max(1,vh));
  }
}

function renderAll(){
  // 涨停栏
  var zb=document.getElementById('ztbar');
  zb.innerHTML='<b>🔥 涨停'+ZT.length+'只</b> ';
  for(var i=0;i<ZT.length;i++){zb.innerHTML+='<span class="zti">'+ZT[i][1]+' +'+ZT[i][2]+'%</span>'}
  
  var gDiv=document.getElementById('groups'),grid=document.getElementById('grid');
  var active=GR[0]?GR[0][0]:'';
  gDiv.innerHTML='';
  for(var i=0;i<GR.length;i++){
    var b=document.createElement('span');
    b.className='grp-btn'+(GR[i][0]===active?' active':'');
    b.style.borderColor=GR[i][1];b.textContent=GR[i][0];
    b.onclick=(function(g){return function(){
      document.querySelectorAll('.grp-btn').forEach(function(e){e.classList.remove('active')});
      this.classList.add('active');showCards(g);
    }})(GR[i][0]);
    gDiv.appendChild(b);
  }
  grid.innerHTML='';
  for(var i=0;i<ST.length;i++){
    var card=document.createElement('div');
    card.className='card';card.id='c'+i;
    card.innerHTML='<div class="card-header"><span class="card-name">'+ST[i][1]+'</span><span class="card-code">'+ST[i][0].substring(2)+'</span><span class="cost"></span></div><div class="card-logic">'+ST[i][2]+'</div><canvas class="chart" id="kl'+i+'"></canvas><canvas class="chart2" id="it'+i+'"></canvas>';
    grid.appendChild(card);
  }
  showCards(active);
  setTimeout(function(){
    for(var i=0;i<ST.length;i++){
      var code=ST[i][0],k=KL[code],t=IT[code];
      if(k){var c=document.getElementById('kl'+i);if(c)drawKL(c,k,c.parentElement.clientWidth-16,120)}
      if(t){var c=document.getElementById('it'+i);if(c){var s=0;for(var j=0;j<t.length;j++)s+=t[j][1];drawIT(c,t,c.parentElement.clientWidth-16,150,s/t.length)}}
      if(k&&k.length){var last=k[k.length-1],prev=k.length>1?k[k.length-2]:null,chg=prev&&prev[2]?((last[2]-prev[2])/prev[2]*100):0;var pc=document.getElementById('c'+i).querySelector('.cost');if(pc)pc.innerHTML='<span class="'+(chg>=0?'price-up':'price-down')+'">'+last[2].toFixed(2)+' '+(chg>=0?'+':'')+chg.toFixed(1)+'%</span>'}
    }
  },200);
}
function showCards(g){
  var ids=[];
  for(var i=0;i<GR.length;i++){if(GR[i][0]===g){ids=GR[i][2];break}}
  for(var i=0;i<ST.length;i++){document.getElementById('c'+i).style.display=ids.indexOf(i)>=0?'block':'none'}
}
renderAll();
</script>
</body>
</html>
