<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:6px;font-size:12px}
.hdr{text-align:center;padding:6px 0}
.hdr h1{font-size:17px;color:#58a6ff}.hdr p{font-size:9px;color:#8b949e}

.concepts{display:flex;flex-direction:column;gap:4px}
.cc{background:#161b22;border-radius:8px;overflow:hidden}
.cc-top{display:flex;align-items:center;padding:9px 10px;gap:7px;cursor:pointer;user-select:none}
.cc-bar{width:3px;height:16px;border-radius:2px;flex-shrink:0}
.cc-name{flex:1;font-size:13px;font-weight:600}
.cc-info{font-size:9px;color:#8b949e;margin-right:4px}
.cc-arrow{font-size:10px;color:#8b949e;transition:.2s}
.cc.open .cc-arrow{transform:rotate(90deg)}
.slist{display:none}
.cc.open .slist{display:block}

.srow{display:flex;align-items:center;padding:7px 10px 7px 20px;cursor:pointer;font-size:11px;border-top:1px solid #21262d}
.srow:active{background:#1c2129}
.srow .sn{font-weight:600;flex:1;min-width:0}
.srow .slo{font-size:9px;color:#8b949e;margin-left:4px}
.srow .sc{min-width:42px;text-align:center;font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700}
.srow .sp{min-width:56px;text-align:right;font-weight:600}
.srow .sq{min-width:44px;text-align:right;font-size:10px}
.s90{background:#238636;color:#fff}.s80{background:#2ea043;color:#fff}.s70{background:#3fb950;color:#000}.s60{background:#9e6a03;color:#fff}
.up{color:#f85149}.dn{color:#3fb950}

.chart-inline{display:none;padding:6px 8px 8px 16px;background:#0a0e14;border-top:1px solid #21262d;border-bottom:1px solid #21262d}
.chart-inline.open{display:block}
.tabs{display:flex;gap:0;margin-bottom:4px;border-radius:4px;overflow:hidden}
.tabs span{flex:1;text-align:center;padding:4px;font-size:10px;cursor:pointer;background:#21262d;color:#8b949e}
.tabs span.on{background:#1f6feb;color:#fff}
.stats{display:flex;gap:3px;margin-bottom:4px;flex-wrap:wrap}
.st{background:#161b22;border-radius:4px;padding:4px 5px;text-align:center;flex:1;min-width:45px}
.st .v{font-size:11px;font-weight:700}.st .l{font-size:7px;color:#8b949e}
svg{display:block;width:100%;max-width:440px;margin:0 auto}
.footer{text-align:center;font-size:8px;color:#484f58;margin-top:8px;padding:4px}
</style>

    else if(p>m20)ss=60;
    pk.innerHTML+='<div class="srow" id="sr'+j+'" onclick="toggleChart('+j+')"><span class="sn">'+nm+'</span><span class="slo">'+lo+'</span><span class="sc '+sc(ss)+'">'+ss+'</span><span class="sp">'+p.toFixed(2)+'</span><span class="sq '+c5(dChg)+'">'+(c5d>0?"+":"")+dChg.toFixed(1)+'%</span></div>';
    pk.innerHTML+='<div class="chart-inline" id="ch'+j+'"><div class="tabs"><span class="on" id="tk'+j+'" onclick="event.stopPropagation();switchTab('+j+',\'k\')">日K</span><span id="tf'+j+'" onclick="event.stopPropagation();switchTab('+j+',\'f\')">分时</span></div><div class="stats" id="s'+j+'"></div><div id="ck'+j+'"></div><div id="cf'+j+'" style="display:none"></div></div>';
  });
  pk.innerHTML+='</div></div>';
});

function toggleConcept(i){
  var cc=document.getElementById("cc"+i);if(!cc)return;
  if(openConcept===i){cc.classList.remove("open");openConcept=-1}else{
    if(openConcept>=0){var old=document.getElementById("cc"+openConcept);if(old)old.classList.remove("open");}
    cc.classList.add("open");openConcept=i;
  }
}

function toggleChart(idx){
  var chart=document.getElementById("ch"+idx);
  if(openStock===idx){
    chart.classList.remove("open");openStock=null;return;
  }
  if(openStock!==null)document.getElementById("ch"+openStock).classList.remove("open");
  chart.classList.add("open");openStock=idx;
  renderCharts(idx);
  chart.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function switchTab(idx,t){
  document.getElementById("tk"+idx).className=t==="k"?"on":"";
  document.getElementById("tf"+idx).className=t==="f"?"on":"";
  document.getElementById("ck"+idx).style.display=t==="k"?"block":"none";
  document.getElementById("cf"+idx).style.display=t==="f"?"block":"none";
}

function renderCharts(idx){
  var s=STOCKS[idx],cd=s[0],nm=s[1];
  var kl=KL[cd];if(!kl)return;
  var cs=kl.map(function(r){return r[2]});
  var p=cs[cs.length-1],m5=cs.slice(-5).reduce(function(a,b){return a+b})/5;
  var m10=cs.slice(-10).reduce(function(a,b){return a+b})/10,m20=cs.slice(-20).reduce(function(a,b){return a+b})/20;
  var c5d=(p/cs[cs.length-5]-1)*100,c20d=(p/cs[cs.length-20]-1)*100;
  
  // Stats
  document.getElementById("s"+idx).innerHTML=
  '<div class="st"><div class="v" style="color:#f85149">'+p.toFixed(2)+'</div><div class="l">现价</div></div>'+
  '<div class="st"><div class="v" style="color:'+(c5d>0?"#f85149":"#3fb950")+'">'+(c5d>0?"+":"")+c5d.toFixed(1)+'%</div><div class="l">5日</div></div>'+
  '<div class="st"><div class="v">'+m5.toFixed(2)+'</div><div class="l">MA5</div></div>'+
  '<div class="st"><div class="v">'+m10.toFixed(2)+'</div><div class="l">MA10</div></div>'+
  '<div class="st"><div class="v">'+m20.toFixed(2)+'</div><div class="l">MA20</div></div>'+
  '<div class="st"><div class="v" style="color:'+(c20d>0?"#f85149":"#3fb950")+'">'+(c20d>0?"+":"")+c20d.toFixed(1)+'%</div><div class="l">20日</div></div>';
  
  // K-line
  function ma(a,n){var s=0,c=0;for(var i=Math.max(0,a.length-n);i<a.length;i++){s+=a[i];c++}return c?s/c:0}
  var ma5=[],ma10s=[],ma20s=[];
  for(var i=0;i<cs.length;i++){ma5.push(ma(cs.slice(0,i+1),5));ma10s.push(ma(cs.slice(0,i+1),10));ma20s.push(ma(cs.slice(0,i+1),20))}
  var W=440,H=240,PL=44,PR=8,PT=16,PB=24,CW=W-PL-PR,CH=H-PT-PB,hi=0,lo=1e9,mxv=0;
  kl.forEach(function(r){if(r[3]>hi)hi=r[3];if(r[4]<lo)lo=r[4];if(r[5]>mxv)mxv=r[5]});
  hi*=1.03;lo*=0.97;var rg=hi-lo||1;
  function px(i){return PL+i*CW/(kl.length-1)}
  function py(p){return PT+(hi-p)/rg*CH}
  var ks='<svg viewBox="0 0 '+W+' '+(H+48)+'" width="100%">';
  for(var i=0;i<=4;i++){var y=PT+i*CH/4;ks+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#21262d"/>';ks+='<text x="'+(PL-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="8" fill="#8b949e">'+(hi-i*rg/4).toFixed(1)+'</text>'}
  kl.forEach(function(r,i){var x=px(i),o=py(r[1]),c=py(r[2]),h=py(r[3]),l=py(r[4]);var cl=r[2]>=r[1]?"#f85149":"#3fb950";ks+='<line x1="'+x+'" y1="'+h+'" x2="'+x+'" y2="'+l+'" stroke="'+cl+'"/>';var bw=Math.max(1.5,CW/kl.length*.75),bh=Math.abs(c-o)||1;ks+='<rect x="'+(x-bw/2)+'" y="'+Math.min(c,o)+'" width="'+bw+'" height="'+bh+'" fill="'+cl+'"/>';if(i%5===0)ks+='<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
  function dm(v,c){var d="";v.forEach(function(p,i){if(p>0)d+=(d?"L":"M")+px(i)+" "+py(p)});if(d)ks+='<path d="'+d+'" fill="none" stroke="'+c+'" stroke-width="1.2"/>'}
  dm(ma5,"#ff6b35");dm(ma10s,"#ffa502");dm(ma20s,"#1e90ff");
  ks+='<text x="'+(W-PR-8)+'" y="12" font-size="8" fill="#ff6b35">MA5</text><text x="'+(W-PR-40)+'" y="12" font-size="8" fill="#ffa502">MA10</text><text x="'+(W-PR-72)+'" y="12" font-size="8" fill="#1e90ff">MA20</text>';
  ks+='<text x="'+PL+'" y="'+(H+10)+'" font-size="7" fill="#8b949e">量(手)</text>';
  var VH=40;mxv=mxv||1;
  kl.forEach(function(r,i){var vh=r[5]/mxv*(VH-6),bw=Math.max(1.5,CW/kl.length*.75);ks+='<rect x="'+(px(i)-bw/2)+'" y="'+(H+8+VH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(r[2]>=r[1]?"#f8514944":"#3fb95044")+'"/>'});
  ks+='</svg>';
  document.getElementById("ck"+idx).innerHTML=ks;
  
  // Intraday
  var intra=INTRA[cd]||[];
  if(intra.length>0){
    renderInlineIntra(idx,intra);
  }else{
    document.getElementById("cf"+idx).innerHTML='<div style="text-align:center;padding:30px;color:#8b949e;font-size:11px">暂无分时数据</div>';
  }
}

function renderInlineIntra(idx,intra){
  var ip=intra.map(function(r){return r[1]}),iv=intra.map(function(r){return r[2]});
  var kl=KL[STOCKS[idx][0]],prevClose=0;
  if(kl&&kl.length>1)prevClose=kl[kl.length-2][2];
  var openP=ip[0],lastP=ip[ip.length-1];
  var chgPct=prevClose?((lastP-prevClose)/prevClose*100):0;
  var chgStr=(chgPct>=0?"+":"")+chgPct.toFixed(2)+"%";
  var chgColor=chgPct>=0?"#f85149":"#3fb950";
  var ihi=Math.max.apply(null,ip)*1.005,ilo=Math.min.apply(null,ip)*0.995;
  if(prevClose>0){ihi=Math.max(ihi,prevClose*1.005);ilo=Math.min(ilo,prevClose*0.995);}
  var imxv=0;for(var vi=0;vi<iv.length;vi++){var mv=vi>0?iv[vi]-(iv[vi-1]||0):iv[vi];if(mv>imxv)imxv=mv;}imxv=imxv||1;
  var iW=440,iH=220,iPL=40,iPR=6,iPT=16,iPB=26,iCW=iW-iPL-iPR,iCH=iH-iPT-iPB,irg=ihi-ilo||1;
  function ipx(i){return iPL+i*iCW/(ip.length-1)}
  function ipy(p){return iPT+(ihi-p)/irg*iCH}
  var is='<svg viewBox="0 0 '+iW+' '+(iH+48)+'" width="100%">';
  for(var i=0;i<=4;i++){var y=iPT+i*iCH/4;is+='<line x1="'+iPL+'" y1="'+y+'" x2="'+(iW-iPR)+'" y2="'+y+'" stroke="#21262d"/>';is+='<text x="'+(iPL-3)+'" y="'+(y+3)+'" text-anchor="end" font-size="7" fill="#8b949e">'+(ihi-i*irg/4).toFixed(2)+'</text>'}
  if(prevClose>0){is+='<line x1="'+iPL+'" y1="'+ipy(prevClose)+'" x2="'+(iW-iPR)+'" y2="'+ipy(prevClose)+'" stroke="#8b949e" stroke-width="1" stroke-dasharray="2,4"/>';}
  var pd="";ip.forEach(function(p,i){pd+=(i?"L":"M")+ipx(i)+" "+ipy(p)});
  is+='<path d="'+pd+' L'+ipx(ip.length-1)+" "+ipy(ilo)+" L"+iPL+" "+ipy(ilo)+' Z" fill="#58a6ff22"/>';
  is+='<path d="'+pd+'" fill="none" stroke="#58a6ff" stroke-width="1.5"/>';
  var avgP=ip.reduce(function(a,b){return a+b})/ip.length;
  is+='<line x1="'+iPL+'" y1="'+ipy(avgP)+'" x2="'+(iW-iPR)+'" y2="'+ipy(avgP)+'" stroke="#ffa502" stroke-width="1.5" stroke-dasharray="6,2"/>';
  intra.forEach(function(r,i){if(i%30===0||i===intra.length-1)is+='<text x="'+ipx(i)+'" y="'+(iH-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
  is+='<text x="'+iPL+'" y="11" font-size="10" font-weight="700" fill="'+chgColor+'">'+chgStr+'</text><text x="'+(iPL+54)+'" y="11" font-size="7" fill="#58a6ff">价'+lastP.toFixed(2)+'</text><text x="'+(iPL+108)+'" y="11" font-size="7" fill="#ffa502">均'+avgP.toFixed(2)+'</text>';
  is+='<text x="'+iPL+'" y="'+(iH+10)+'" font-size="7" fill="#8b949e">量(手)</text>';
  var iVH=40;
  intra.forEach(function(r,i){var mv=(i>0?r[2]-(intra[i-1]?intra[i-1][2]:0):r[2]);var vh=(mv||1)/imxv*(iVH-6),bw=Math.max(0.5,iCW/intra.length*.8);is+='<rect x="'+(ipx(i)-bw/2)+'" y="'+(iH+8+iVH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(i>0&&ip[i]>=ip[i-1]?"#f8514988":"#3fb95088")+'"/>'});
  is+='</svg>';
  // Update stats
  document.getElementById("s"+idx).innerHTML=
  '<div class="st"><div class="v" style="color:#f85149">'+lastP.toFixed(2)+'</div><div class="l">现价</div></div>'+
  '<div class="st"><div class="v" style="color:'+chgColor+'">'+chgStr+'</div><div class="l">涨幅</div></div>'+
  '<div class="st"><div class="v">'+avgP.toFixed(2)+'</div><div class="l">均价</div></div>'+
  '<div class="st"><div class="v">'+openP.toFixed(2)+'</div><div class="l">开盘</div></div>'+
  '<div class="st"><div class="v">'+(prevClose?prevClose.toFixed(2):"-")+'</div><div class="l">昨收</div></div>'+
  '<div class="st"><div class="v">'+(imxv/10000).toFixed(1)+'万</div><div class="l">峰值量</div></div>';
  document.getElementById("cf"+idx).innerHTML=is;
}
</script>
