<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>阿财看盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:8px;font-size:13px}
/* header */
.hdr{text-align:center;padding:4px 0 8px}
.hdr h1{font-size:17px;color:#58a6ff;margin-bottom:2px}
.hdr p{font-size:10px;color:#8b949e}
/* concept cards */
.concepts{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.cc{background:#161b22;border-radius:8px;overflow:hidden;cursor:pointer}
.cc-top{display:flex;align-items:center;padding:10px 12px;gap:8px}
.cc-bar{width:3px;height:18px;border-radius:2px}
.cc-name{flex:1;font-size:13px;font-weight:600}
.cc-count{font-size:10px;color:#8b949e;margin-right:6px}
.cc-arrow{font-size:10px;color:#8b949e;transition:transform .2s}
.cc.open .cc-arrow{transform:rotate(90deg)}
.cc-stocks{display:none;flex-wrap:wrap;gap:6px;padding:4px 12px 10px 22px}
.cc.open .cc-stocks{display:flex}
.ss{display:inline-block;padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;background:#21262d;border:1px solid #30363d;color:#c9d1d9}
.ss.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
/* stats row */
.stats{display:flex;gap:4px;margin-bottom:8px}
.st{background:#161b22;border-radius:6px;padding:6px 4px;flex:1;text-align:center}
.st .v{font-size:13px;font-weight:700}.st .l{font-size:8px;color:#8b949e}
/* tabs */
.tab{display:flex;gap:0;margin-bottom:6px;border-radius:6px;overflow:hidden}
.tb{flex:1;text-align:center;padding:6px;font-size:11px;cursor:pointer;background:#21262d;color:#8b949e;border:none}
.tb.on{background:#1f6feb;color:#fff}
/* chart */
svg{display:block;width:100%;max-width:480px;margin:0 auto}
.footer{text-align:center;font-size:8px;color:#484f58;margin-top:10px;padding:4px}
</style>
</head>
<body>

<div id="ck"></div>

    intra.forEach((r,i)=>{if(i%30===0||i===intra.length-1)is+='<text x="'+ipx(i)+'" y="'+(iH-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
    is+='<text x="'+(iW-iPR-8)+'" y="12" font-size="8" fill="#58a6ff">价</text><text x="'+(iW-iPR-32)+'" y="12" font-size="8" fill="#ffa502">均'+avgP.toFixed(2)+'</text>';
    var iVH=48;
    is+='<text x="'+iPL+'" y="'+(iH+12)+'" font-size="8" fill="#8b949e">量(手)</text>';
    intra.forEach((r,i)=>{var vh=var mv=(i>0?r[2]-(intra[i-1]?intra[i-1][2]:0):r[2]);var vh=(mv||1)/imxv*(iVH-6),bw=Math.max(0.5,iCW/intra.length*.8);is+='<rect x="'+(ipx(i)-bw/2)+'" y="'+(iH+10+iVH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(i>0&&ip[i]>=ip[i-1]?'#f8514988':'#3fb95088')+'"/>'});
    is+='</svg>';
    document.getElementById("cf").innerHTML=is;
  }else{
    document.getElementById("cf").innerHTML='<div style="text-align:center;padding:50px;color:#8b949e">⏸ 暂无分时数据</div>';
  }
}
function st(t){
  document.getElementById("tk").className=t==="k"?"tb on":"tb";
  document.getElementById("tf").className=t==="f"?"tb on":"tb";
  document.getElementById("ck").style.display=t==="k"?"block":"none";
  document.getElementById("cf").style.display=t==="f"?"block":"none";
}
pick(0);
// === 实时分时刷新 ===
function isTrading(){
  var n=new Date(),d=n.getDay(),h=n.getHours(),m=n.getMinutes();
  if(d===0||d===6)return false;
  var t=h*60+m;
  return (t>=570&&t<=690)||(t>=780&&t<=900); // 9:30-11:30, 13:00-15:00
}
var DATA_SERVER="";

function tryConnect(){
  // Try local server first (same WiFi)
  var urls=["http://192.168.1.14:8898","http://192.168.38.231:8898"];
  var found=false;
  function testUrl(i){
    if(i>=urls.length){document.getElementById("conn-badge").innerHTML='⏺ 离线';return}
    var x=new XMLHttpRequest();
    x.open("GET",urls[i]+"/health",true);
    x.timeout=3000;
    x.onload=function(){if(x.status===200&&JSON.parse(x.responseText).ok){DATA_SERVER=urls[i];document.getElementById("conn-badge").innerHTML='<span style=\"color:#3fb950\">🟢 实时连接</span>';found=true}else testUrl(i+1)};
    x.onerror=function(){testUrl(i+1)};
    x.ontimeout=function(){testUrl(i+1)};
    x.send();
  }
  testUrl(0);
}
tryConnect();
setInterval(tryConnect,60000);

function fetchIntra(codeKey){
  var x=new XMLHttpRequest();
  var apiUrl=DATA_SERVER?DATA_SERVER+"/api/minute/"+codeKey:"https://web.ifzq.gtimg.cn/appstock/app/minute/query?code="+codeKey;x.open("GET",apiUrl+"?_="+Date.now(),true);
  x.onload=function(){
    if(x.status!==200)return;
    try{
      var d=JSON.parse(x.responseText);
      var mins;
      if(DATA_SERVER){
        mins=d.minute;
        var intra=[];
        for(var i=0;i<mins.length;i++){
          intra.push([mins[i].t,mins[i].p,mins[i].v]);
        }
        INTRA[codeKey]=intra;
        if(cur!==null&&STOCKS[cur][0]===codeKey&&document.getElementById("tf").className==="tb on"){renderIntra(codeKey,intra)}
        document.getElementById("refresh-time").textContent=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
        return;
      }
      mins=d.data[codeKey].data.data;
      var intra=[];
      for(var i=0;i<mins.length;i++){
        var p=mins[i].split(" ");
        if(p.length>=3)intra.push([p[0],parseFloat(p[1]),parseFloat(p[2])]);
      }
      INTRA[codeKey]=intra;
      // Re-render if this stock is currently selected
      if(cur!==null&&STOCKS[cur][0]===codeKey&&document.getElementById("tf").className==="tb on"){
        renderIntra(codeKey,intra);
      }
      document.getElementById("refresh-time").textContent=new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
    }catch(e){}
  };
  x.send();
}
function renderIntra(key,intra){
  if(!intra||intra.length===0)return;
  var ip=intra.map(function(r){return r[1]}),iv=intra.map(function(r){return r[2]});
  var ihi=Math.max.apply(null,ip)*1.005,ilo=Math.min.apply(null,ip)*0.995,imxv=Math.max.apply(null,iv)||1;
  var iW=460,iH=240,iPL=40,iPR=8,iPT=15,iPB=25,iCW=iW-iPL-iPR,iCH=iH-iPT-iPB,irg=ihi-ilo||1;
  function ipx(i){return iPL+i*iCW/(ip.length-1)}
  function ipy(p){return iPT+(ihi-p)/irg*iCH}
  var is='<svg viewBox="0 0 '+iW+' '+(iH+55)+'" width="100%" style="max-width:480px"><rect width="'+iW+'" height="'+(iH+55)+'" fill="#0d1117"/>';
  for(var i=0;i<=4;i++){var y=iPT+i*iCH/4;is+='<line x1="'+iPL+'" y1="'+y+'" x2="'+(iW-iPR)+'" y2="'+y+'" stroke="#21262d"/>';is+='<text x="'+(iPL-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="8" fill="#8b949e">'+(ihi-i*irg/4).toFixed(2)+'</text>'}
  var pd='';ip.forEach(function(p,i){pd+=(i?"L":"M")+ipx(i)+" "+ipy(p)});
  is+='<path d="'+pd+' L'+ipx(ip.length-1)+" "+ipy(ilo)+" L"+iPL+" "+ipy(ilo)+' Z" fill="#58a6ff22"/>';
  is+='<path d="'+pd+'" fill="none" stroke="#58a6ff" stroke-width="1.5"/>';
  var avgP=ip.reduce(function(a,b){return a+b})/ip.length;
  is+='<line x1="'+iPL+'" y1="'+ipy(avgP)+'" x2="'+(iW-iPR)+'" y2="'+ipy(avgP)+'" stroke="#ffa502" stroke-width="1" stroke-dasharray="5,3"/>';
  intra.forEach(function(r,i){if(i%30===0||i===intra.length-1)is+='<text x="'+ipx(i)+'" y="'+(iH-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
  is+='<text x="'+(iW-iPR-8)+'" y="12" font-size="8" fill="#58a6ff">价</text><text x="'+(iW-iPR-32)+'" y="12" font-size="8" fill="#ffa502">均'+avgP.toFixed(2)+'</text>';
  is+='<text x="'+iPL+'" y="'+(iH+12)+'" font-size="8" fill="#8b949e">量(手)</text>';
  var iVH=48;
  intra.forEach(function(r,i){var vh=var mv=(i>0?r[2]-(intra[i-1]?intra[i-1][2]:0):r[2]);var vh=(mv||1)/imxv*(iVH-6),bw=Math.max(0.5,iCW/intra.length*.8);is+='<rect x="'+(ipx(i)-bw/2)+'" y="'+(iH+10+iVH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(i>0&&ip[i]>=ip[i-1]?"#3fb95088":"#f8514988")+'"/>'});
  is+='</svg>';
  document.getElementById("cf").innerHTML=is;
}
// Auto-refresh during trading
setInterval(function(){
  if(isTrading()&&cur!==null){
    fetchIntra(STOCKS[cur][0]);
  }
  // Update badge
  var badge=document.getElementById("live-badge");
  if(badge){
    if(isTrading()){badge.textContent="● 实时";badge.style.color="#3fb950"}
    else{badge.textContent="休市";badge.style.color="#8b949e"}
  }
},30000);
