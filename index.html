  ks+='<text x="'+(W-PR-6)+'" y="12" font-size="8" fill="#ff6b35">MA5</text><text x="'+(W-PR-38)+'" y="12" font-size="8" fill="#ffa502">MA10</text><text x="'+(W-PR-70)+'" y="12" font-size="8" fill="#1e90ff">MA20</text>';
  ks+='<text x="'+PL+'" y="'+(H+10)+'" font-size="7" fill="#8b949e">量(手)</text>';
  var VH=40;mxv=mxv||1;
  kl.forEach(function(r,i){var vh=r[5]/mxv*(VH-6),bw=Math.max(1.5,CW/kl.length*.75);ks+='<rect x="'+(px(i)-bw/2)+'" y="'+(H+8+VH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(r[2]>=r[1]?"#f8514944":"#3fb95044")+'"/>'});
  ks+='</svg>';
  document.getElementById("ck"+idx).innerHTML=ks;
  var it=IT[cd]||[];
  if(it.length>0){
    var ip=[],iv=[];
    for(var j=0;j<it.length;j++){ip.push(it[j][1]);iv.push(it[j][2]*100)}
    var pc2=kl&&kl.length>1?kl[kl.length-2][2]:0,op=ip[0],lp=ip[ip.length-1];

    var ihi=Math.max.apply(null,ip)*1.005,ilo=Math.min.apply(null,ip)*0.995;
    if(pc2>0){ihi=Math.max(ihi,pc2*1.005);ilo=Math.min(ilo,pc2*0.995)}
    var imxv=0;for(var j=1;j<iv.length;j++){var mv=iv[j]-iv[j-1];if(mv>imxv)imxv=mv}imxv=imxv||1;
    var iW=420,iH=220,iPL=40,iPR=6,iPT=16,iPB=26,iCW=iW-iPL-iPR,iCH=iH-iPT-iPB,irg=ihi-ilo||1;
    function ipx(j){return iPL+j*iCW/(ip.length-1)}
    function ipy(p){return iPT+(ihi-p)/irg*iCH}
    var is='<svg viewBox="0 0 '+iW+' '+(iH+48)+'" width="100%">';
    for(var j=0;j<=4;j++){var y=iPT+j*iCH/4;is+='<line x1="'+iPL+'" y1="'+y+'" x2="'+(iW-iPR)+'" y2="'+y+'" stroke="#21262d"/>';is+='<text x="'+(iPL-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="7" fill="#8b949e">'+(ihi-j*irg/4).toFixed(2)+'</text>'}
    if(pc2>0)is+='<line x1="'+iPL+'" y1="'+ipy(pc2)+'" x2="'+(iW-iPR)+'" y2="'+ipy(pc2)+'" stroke="#8b949e" stroke-width="1" stroke-dasharray="2,4"/>';
    var pd="";ip.forEach(function(p,j){pd+=(j?"L":"M")+ipx(j)+" "+ipy(p)});
    is+='<path d="'+pd+' L'+ipx(ip.length-1)+" "+ipy(ilo)+" L"+iPL+" "+ipy(ilo)+' Z" fill="#58a6ff22"/>';
    is+='<path d="'+pd+'" fill="none" stroke="#58a6ff" stroke-width="1.5"/>';
    var avgP=ip.reduce(function(a,b){return a+b})/ip.length;
    is+='<line x1="'+iPL+'" y1="'+ipy(avgP)+'" x2="'+(iW-iPR)+'" y2="'+ipy(avgP)+'" stroke="#ffa502" stroke-width="1.5" stroke-dasharray="6,2"/>';
    it.forEach(function(r,j){if(j%30===0||j===it.length-1)is+='<text x="'+ipx(j)+'" y="'+(iH-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
    is+='<text x="'+iPL+'" y="11" font-size="10" font-weight="700" fill="'+chgC+'">'+(chg>=0?"+":"")+chg.toFixed(2)+'%</text><text x="'+(iPL+54)+'" y="11" font-size="7" fill="#58a6ff">价'+lp.toFixed(2)+'</text><text x="'+(iPL+108)+'" y="11" font-size="7" fill="#ffa502">均'+avgP.toFixed(2)+'</text>';
    is+='<text x="'+iPL+'" y="'+(iH+10)+'" font-size="7" fill="#8b949e">量(手)</text>';
    var iVH=40;
    it.forEach(function(r,j){var mv=(j>0?(iv[j]-iv[j-1]):iv[j]),vh=(mv||1)/imxv*(iVH-6),bw=Math.max(0.5,iCW/it.length*.8);is+='<rect x="'+(ipx(j)-bw/2)+'" y="'+(iH+8+iVH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(j>0&&ip[j]>=ip[j-1]?"#f8514988":"#3fb95088")+'"/>'});
    is+='</svg>';
    document.getElementById("cf"+idx).innerHTML=is;
    document.getElementById("cs"+idx).innerHTML=
    '<div class="cst2"><div class="v">'+lp.toFixed(2)+'</div><div class="l">现价</div></div>'+
    '<div class="cst2"><div class="v" style="color:'+chgC+'">'+(chg>=0?"+":"")+chg.toFixed(2)+'%</div><div class="l">涨幅</div></div>'+
    '<div class="cst2"><div class="v">'+avgP.toFixed(2)+'</div><div class="l">均价</div></div>'+
    '<div class="cst2"><div class="v">'+op.toFixed(2)+'</div><div class="l">开盘</div></div>'+
    '<div class="cst2"><div class="v">'+(pc2?pc2.toFixed(2):"-")+'</div><div class="l">昨收</div></div>'+
    '<div class="cst2"><div class="v">'+(imxv/10000).toFixed(1)+'万</div><div class="l">峰值量</div></div>';
  }else{
    document.getElementById("cf"+idx).innerHTML='<div style="text-align:center;padding:20px;color:#8b949e;font-size:11px">暂无分时数据</div>';
  }
}
</script>
