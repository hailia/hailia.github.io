    pk.innerHTML+='<div class="sr" onclick="sel('+i+')"><span class="sn">'+nm+'</span><span class="so">'+lo+'</span><span class="sp">'+p.toFixed(2)+'</span><span class="sq '+cv(dc)+'">'+(dc>0?"+":"")+dc.toFixed(1)+'%</span></div><div class="ch" id="ch'+i+'" style="display:none;padding:4px 6px 8px 16px;background:#0a0e14;border-top:1px solid #21262d;border-bottom:1px solid #21262d"><div class="ctab"><span class="ctb on" onclick="event.stopPropagation();st2('+i+',\'k\')">日K</span><span class="ctb" onclick="event.stopPropagation();st2('+i+',\'f\')">分时</span></div><div class="cst" id="cs'+i+'"></div><div id="ck'+i+'"></div><div id="cf'+i+'" style="display:none"></div></div>';
  });
  pk.innerHTML+='</div></div>';
});

// Concept toggle via event delegation
document.getElementById("pk").onclick=function(e){
  var el=e.target||e.srcElement;
  while(el&&el!==this){
    var gi=el.getAttribute("data-gi");
    if(gi!==null){tg(parseInt(gi));return;}
    el=el.parentNode;
  }
};

function cv(v){return v>0?"up":(v<0?"dn":"")}

function tg(i){
  var sl=document.getElementById("sl"+i);if(!sl)return;
  var cc=document.getElementById("cc"+i);
  if(oc===i){
    sl.style.display="none";
    if(cc)cc.className="cc";
    oc=-1;
  }else{
    if(oc>=0){
      var os=document.getElementById("sl"+oc);if(os)os.style.display="none";
      var oc2=document.getElementById("cc"+oc);if(oc2)oc2.className="cc";
    }
    sl.style.display="block";
    if(cc)cc.className="cc open";
    oc=i;
  }
}

function sel(idx){
  var ch=document.getElementById("ch"+idx);
  if(openCh===idx){
    ch.style.display="none";openCh=null;return;
  }
  if(openCh!==null)document.getElementById("ch"+openCh).style.display="none";
  ch.style.display="block";openCh=idx;
  renderInline(idx);
  setTimeout(function(){ch.scrollIntoView({behavior:"smooth",block:"nearest"})},100);
}

function st2(idx,t){
  document.getElementById("ck"+idx).style.display=t==="k"?"block":"none";
  document.getElementById("cf"+idx).style.display=t==="f"?"block":"none";
}

function renderInline(idx){
  var s=ST[idx],cd=s[0],nm=s[1],kl=KL[cd];if(!kl||kl.length<2)return;
  var cs=kl.map(function(r){return r[2]}),p=cs[cs.length-1];
  var m5=cs.slice(-5).reduce(function(a,b){return a+b})/5,m10=cs.slice(-10).reduce(function(a,b){return a+b})/10,m20=cs.slice(-20).reduce(function(a,b){return a+b})/20;
  var c5d=(p/cs[cs.length-5]-1)*100,c20d=(p/cs[cs.length-20]-1)*100;
  document.getElementById("cs"+idx).innerHTML=
  '<div class="cst2"><div class="v" style="color:#f85149">'+p.toFixed(2)+'</div><div class="l">现价</div></div>'+
  '<div class="cst2"><div class="v" style="color:'+(c5d>0?"#f85149":"#3fb950")+'">'+(c5d>0?"+":"")+c5d.toFixed(1)+'%</div><div class="l">5日</div></div>'+
  '<div class="cst2"><div class="v">'+m5.toFixed(2)+'</div><div class="l">MA5</div></div>'+
  '<div class="cst2"><div class="v">'+m10.toFixed(2)+'</div><div class="l">MA10</div></div>'+
  '<div class="cst2"><div class="v">'+m20.toFixed(2)+'</div><div class="l">MA20</div></div>'+
  '<div class="cst2"><div class="v" style="color:'+(c20d>0?"#f85149":"#3fb950")+'">'+(c20d>0?"+":"")+c20d.toFixed(1)+'%</div><div class="l">20日</div></div>';

  function avg(a,n){var s=0,c=0;for(var i=Math.max(0,a.length-n);i<a.length;i++){s+=a[i];c++}return c?s/c:0}
  var a5=[],a10=[],a20=[];
  for(var i=0;i<cs.length;i++){a5.push(avg(cs.slice(0,i+1),5));a10.push(avg(cs.slice(0,i+1),10));a20.push(avg(cs.slice(0,i+1),20))}
  var W=420,H=240,PL=44,PR=6,PT=16,PB=24,CW=W-PL-PR,CH=H-PT-PB,hi=0,lo=1e9,mxv=0;
  kl.forEach(function(r){if(r[3]>hi)hi=r[3];if(r[4]<lo)lo=r[4];if(r[5]>mxv)mxv=r[5]});
  hi*=1.03;lo*=0.97;var rg=hi-lo||1;
  function px(i){return PL+i*CW/(kl.length-1)}
  function py(p){return PT+(hi-p)/rg*CH}
  var ks='<svg viewBox="0 0 '+W+' '+(H+48)+'" width="100%">';
  for(var i=0;i<=4;i++){var y=PT+i*CH/4;ks+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#21262d"/>';ks+='<text x="'+(PL-4)+'" y="'+(y+3)+'" text-anchor="end" font-size="8" fill="#8b949e">'+(hi-i*rg/4).toFixed(1)+'</text>'}
  kl.forEach(function(r,i){var x=px(i),o=py(r[1]),c=py(r[2]),h=py(r[3]),l=py(r[4]);var cl=r[2]>=r[1]?"#f85149":"#3fb950";ks+='<line x1="'+x+'" y1="'+h+'" x2="'+x+'" y2="'+l+'" stroke="'+cl+'"/>';var bw=Math.max(1.5,CW/kl.length*.75),bh=Math.abs(c-o)||1,by=Math.min(c,o);ks+='<rect x="'+(x-bw/2)+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+cl+'"/>';if(i%5===0)ks+='<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-size="7" fill="#8b949e">'+r[0]+'</text>'});
  function dm(v,c){var d="";v.forEach(function(p,i){if(p>0)d+=(d?"L":"M")+px(i)+" "+py(p)});if(d)ks+='<path d="'+d+'" fill="none" stroke="'+c+'" stroke-width="1.2"/>'}
  dm(a5,"#ff6b35");dm(a10,"#ffa502");dm(a20,"#1e90ff");
  ks+='<text x="'+(W-PR-6)+'" y="12" font-size="8" fill="#ff6b35">MA5</text><text x="'+(W-PR-38)+'" y="12" font-size="8" fill="#ffa502">MA10</text><text x="'+(W-PR-70)+'" y="12" font-size="8" fill="#1e90ff">MA20</text>';
  ks+='<text x="'+PL+'" y="'+(H+10)+'" font-size="7" fill="#8b949e">量(手)</text>';
  var VH=40;mxv=mxv||1;
  kl.forEach(function(r,i){var vh=r[5]/mxv*(VH-6),bw=Math.max(1.5,CW/kl.length*.75);ks+='<rect x="'+(px(i)-bw/2)+'" y="'+(H+8+VH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(r[2]>=r[1]?"#f8514944":"#3fb95044")+'"/>'});
  ks+='</svg>';
  document.getElementById("ck"+idx).innerHTML=ks;
  document.getElementById("cf"+idx).innerHTML='<div style="text-align:center;padding:20px;color:#8b949e;font-size:11px">分时需嵌入数据,暂不可用</div>';
}

</script>
