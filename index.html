<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>阿财看盘</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#c9d1d9;padding:8px;font-size:13px;min-height:100vh}
.hdr{text-align:center;padding:12px 0 8px}
.hdr h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.hdr .date{font-size:10px;color:#6e7681}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;margin:8px 0}
.card{background:#12121a;border-radius:10px;overflow:hidden;border:1px solid #1c1c2a}
.card-hd{display:flex;align-items:center;padding:10px 12px;cursor:pointer;gap:8px;transition:background .2s}
.card-hd:active{background:#1a1a28}
.card-hd .dot{width:4px;height:20px;border-radius:2px;flex-shrink:0}
.card-hd .name{flex:1;font-size:13px;font-weight:600}
.card-hd .cnt{font-size:10px;color:#6e7681;background:#1c1c2a;padding:2px 8px;border-radius:10px}
.card-hd .avg{font-size:10px;font-weight:600;min-width:42px;text-align:right}
.card-hd .arr{font-size:10px;color:#484f58;transition:transform .25s;width:14px;text-align:center}
.card.open .arr{transform:rotate(90deg)}
.card-bd{display:none}
.card.open .card-bd{display:block}
.stock-row{display:flex;align-items:center;padding:7px 12px 7px 20px;cursor:pointer;border-top:1px solid #161620;gap:6px;transition:background .15s}
.stock-row:active{background:#181828}
.stock-row .sd{width:6px;height:6px;border-radius:50%;flex-shrink:0;opacity:.5}
.stock-row .sc{font-size:10px;color:#6e7681;width:48px;flex-shrink:0}
.stock-row .sn{flex:1;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-row .sl{font-size:9px;color:#484f58;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none}
.stock-row .sp{font-size:12px;font-weight:600;min-width:56px;text-align:right}
.stock-row .sq{font-size:11px;font-weight:600;min-width:48px;text-align:right}
.stock-row .s5{font-size:10px;font-weight:500;min-width:40px;text-align:right;display:none}
.up{color:#f85149}.dn{color:#3fb950}
.chart-panel{display:none;padding:4px 10px 10px 20px;background:#0c0c14;border-top:1px solid #161620}
.chart-panel.open{display:block}
.cht-tabs{display:flex;gap:2px;margin-bottom:6px}
.cht-tab{padding:4px 14px;border-radius:6px 6px 0 0;font-size:11px;cursor:pointer;color:#6e7681;background:#14141e;border:1px solid transparent;border-bottom:none}
.cht-tab.act{color:#58a6ff;background:#1a1a2e;border-color:#252540}
.chart-box{width:100%;height:380px;background:#0a0a12;border-radius:6px;overflow:hidden}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0}
.stat{padding:4px 10px;background:#14141e;border-radius:6px;font-size:10px}
.stat .val{font-weight:600}
.ft{text-align:center;padding:16px;font-size:9px;color:#484f58}
@media(max-width:640px){
  .grid{grid-template-columns:1fr;gap:6px}
  .chart-box{height:320px}
  .stock-row .s5{display:inline}
  .stock-row .sl{display:inline}
  .stock-row{padding:7px 10px 7px 14px}
  .stock-row .sc{width:42px;font-size:9px}
}
</style>
</head>
<body>

</div>

function getChg(code){
  var k=KL[code];if(!k||k.length<2)return 0;
  var prev=k[k.length-2][2],cur=k[k.length-1][2];
  return prev?((cur-prev)/prev*100):0;
}
// 5日涨幅
function get5d(code){
  var k=KL[code];if(!k||k.length<6)return 0;
  var base=k[k.length-6][2],cur=k[k.length-1][2];
  return base?((cur-base)/base*100):0;
}
// 最新收盘价
function getPrice(code){
  var k=KL[code];return k&&k.length?k[k.length-1][2]:0;
}
// 格式化涨幅
function fmtPct(v){
  if(v===0)return '0.00%';
  return (v>0?'+':'')+v.toFixed(2)+'%';
}

function fmtClr(v){return v>=0?'up':'dn';}

// 更新时间
(function(){
  var latest='';
  for(var c in KL){var k=KL[c];if(k.length){var d=k[k.length-1][0];if(d>latest)latest=d;}}
  document.getElementById('updateTime').textContent='📅 '+latest+' 更新';
})();

// 构建板块卡片
var grid=document.getElementById('grid');
GR.forEach(function(g,gi){
  var stocks=g.ids.map(function(i){return ST[i];});
  var avgChg=0,cnt=0;
  stocks.forEach(function(s){
    var chg=getChg(s[0]);
    if(!isNaN(chg)){avgChg+=chg;cnt++;}
  });
  avgChg=cnt?avgChg/cnt:0;

  var card=document.createElement('div');
  card.className='card';
  card.id='card'+gi;
  card.innerHTML=
    '<div class="card-hd" onclick="toggleCard('+gi+')">'+
      '<div class="dot" style="background:'+g.c+'"></div>'+
      '<div class="name" style="color:'+g.c+'">'+g.n+'</div>'+
      '<div class="cnt">'+stocks.length+'只</div>'+
      '<div class="avg '+fmtClr(avgChg)+'">'+(avgChg>=0?'+':'')+avgChg.toFixed(1)+'%</div>'+
      '<div class="arr">▶</div>'+
    '</div>'+
    '<div class="card-bd"></div>';
  grid.appendChild(card);

  var bd=card.querySelector('.card-bd');
  stocks.forEach(function(s,si){
    var code=s[0],logic=s[2]||'';
    var price=getPrice(code),chg=getChg(code),d5=get5d(code);
    var row=document.createElement('div');
    row.className='stock-row';
    row.setAttribute('data-code',code);
    row.setAttribute('data-gi',gi);
    row.setAttribute('data-si',si);
    row.onclick=function(e){e.stopPropagation();toggleChart(this);};
    row.innerHTML=
      '<div class="sd" style="background:'+g.c+'"></div>'+
      '<div class="sc">'+code.replace('sh','').replace('sz','')+'</div>'+
      '<div class="sn">'+s[1]+'</div>'+
      '<div class="sl">'+logic+'</div>'+
      '<div class="sp">'+price.toFixed(2)+'</div>'+
      '<div class="sq '+fmtClr(chg)+'">'+fmtPct(chg)+'</div>'+
      '<div class="s5 '+fmtClr(d5)+'">5d '+fmtPct(d5)+'</div>';
    bd.appendChild(row);

    // 图表面板
    var panel=document.createElement('div');
    panel.className='chart-panel';
    panel.id='cp-'+code;
    panel.innerHTML=
      '<div class="cht-tabs">'+
        '<div class="cht-tab act" onclick="switchTab(\''+code+'\',\'k\',event)">日K线</div>'+
        '<div class="cht-tab" onclick="switchTab(\''+code+'\',\'f\',event)">分时图</div>'+
      '</div>'+
      '<div class="chart-box" id="chk-'+code+'"></div>'+
      '<div class="chart-box" id="chf-'+code+'" style="display:none"></div>';
    bd.appendChild(panel);
  });
});

// 板块折叠
function toggleCard(gi){
  var card=document.getElementById('card'+gi);
  card.classList.toggle('open');
}

// 图表展开
var openChart=null,chartInst={};
function toggleChart(row){
  var code=row.getAttribute('data-code');
  var panel=document.getElementById('cp-'+code);
  var isOpen=panel.classList.contains('open');

  // 关闭之前打开的
  if(openChart&&openChart!==code){
    var prev=document.getElementById('cp-'+openChart);
    if(prev)prev.classList.remove('open');
  }

  if(isOpen){
    panel.classList.remove('open');
    openChart=null;
  }else{
    panel.classList.add('open');
    openChart=code;
    if(!chartInst[code+'_k'])renderKLine(code);
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
}

// Tab切换
function switchTab(code,tab,ev){
  ev.stopPropagation();
  document.getElementById('chk-'+code).style.display=tab==='k'?'block':'none';
  document.getElementById('chf-'+code).style.display=tab==='f'?'block':'none';
  var tabs=document.getElementById('cp-'+code).querySelectorAll('.cht-tab');
  tabs[0].classList.toggle('act',tab==='k');
  tabs[1].classList.toggle('act',tab==='f');
  if(tab==='f'&&!chartInst[code+'_f'])renderFLine(code);
  if(tab==='k'&&chartInst[code+'_k'])chartInst[code+'_k'].resize();
  if(tab==='f'&&chartInst[code+'_f'])chartInst[code+'_f'].resize();
}

// 日K线图（含MACD，仿标准股票软件）
function renderKLine(code){
  var dom=document.getElementById('chk-'+code);
  var k=KL[code];if(!k||k.length<2){dom.innerHTML='<div style="color:#484f58;text-align:center;padding:40px">无K线数据</div>';return}
  var dates=[],vals=[],vols=[],closes=[];
  k.forEach(function(r){
    dates.push(r[0]);
    vals.push([r[1],r[4],r[2],r[3]]); // [open,low,close,high] — ECharts candlestick格式
    vols.push(r[5]);
    closes.push(r[2]);
  });
  // MA
  function ma(arr,n){
    var res=[];
    for(var i=0;i<arr.length;i++){
      if(i<n-1){res.push(null);continue}
      var s=0;for(var j=i-n+1;j<=i;j++)s+=arr[j];res.push(s/n);
    }
    return res;
  }
  var ma5=ma(closes,5),ma10=ma(closes,10),ma20=ma(closes,20);
  // MACD（标准公式）
  function ema(arr,n){
    var k=2/(n+1),res=[];
    for(var i=0;i<arr.length;i++){
      if(i===0){res.push(arr[0]);continue}
      res.push(arr[i]*k+res[i-1]*(1-k));
    }
    return res;
  }
  var ema12=ema(closes,12),ema26=ema(closes,26);
  var dif=[],dea=[],macd=[];
  for(var i=0;i<closes.length;i++){
    var d=ema12[i]-ema26[i];dif.push(d);
    if(i<8){dea.push(null);macd.push(null);continue}
    var de=0;for(var j=i-8;j<=i;j++)de+=dif[j];de/=9;
    dea.push(de);macd.push(2*(d-de)*100);
  }

  var chart=echarts.init(dom);
  chartInst[code+'_k']=chart;
  var up='#f85149',dn='#3fb950';
  var last=closes[closes.length-1],prev=closes[closes.length-2];
  var chgPct=prev?((last-prev)/prev*100):0;
  var ohcl=vals[vals.length-1];
  var infoTitle=code.replace('sh','').replace('sz','')+' '+'开'+ohcl[0].toFixed(2)+' 高'+ohcl[3].toFixed(2)+' 低'+ohcl[1].toFixed(2)+' 收'+ohcl[2].toFixed(2)+' '+(chgPct>=0?'+':'')+chgPct.toFixed(2)+'%';
  var option={
    title:{text:infoTitle,left:6,top:4,textStyle:{fontSize:10,color:'#c9d1d9',fontWeight:'normal'}},
    grid:[{left:8,right:8,top:30,height:'48%'},{left:8,right:8,top:'82%',height:'8%'},{left:8,right:8,top:'93%',height:'6%'}],
    xAxis:[{type:'category',data:dates,gridIndex:0,axisLabel:{fontSize:7,color:'#6e7681',interval:Math.floor(dates.length/6)},axisLine:{lineStyle:{color:'#1c1c2a'}},axisTick:{show:false}},
           {type:'category',data:dates,gridIndex:1,axisLabel:{show:false},axisLine:{lineStyle:{color:'#1c1c2a'}},axisTick:{show:false}},
           {type:'category',data:dates,gridIndex:2,axisLabel:{show:false},axisLine:{lineStyle:{color:'#1c1c2a'}},axisTick:{show:false}}],
    yAxis:[{type:'value',gridIndex:0,scale:true,splitLine:{lineStyle:{color:'#1c1c2a'}},axisLabel:{fontSize:7,color:'#6e7681',formatter:function(v){return v.toFixed(1)}}},
           {type:'value',gridIndex:1,splitLine:{show:false},axisLabel:{show:false}},
           {type:'value',gridIndex:2,splitLine:{lineStyle:{color:'#1c1c2a'}},axisLabel:{fontSize:6,color:'#6e7681'}}],
    series:[
      {name:'K线',type:'candlestick',xAxisIndex:0,yAxisIndex:0,data:vals,
       itemStyle:{color:up,color0:dn,borderColor:up,borderColor0:dn}},
      {name:'MA5',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma5,smooth:true,lineStyle:{width:1,color:'#ff6b35'},symbol:'none',
       endLabel:{show:true,formatter:'MA5 {c}',fontSize:8,color:'#ff6b35',offset:[0,0]}},
      {name:'MA10',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma10,smooth:true,lineStyle:{width:1,color:'#ffa502'},symbol:'none',
       endLabel:{show:true,formatter:'MA10 {c}',fontSize:8,color:'#ffa502',offset:[0,0]}},
      {name:'MA20',type:'line',xAxisIndex:0,yAxisIndex:0,data:ma20,smooth:true,lineStyle:{width:1,color:'#1e90ff'},symbol:'none',
       endLabel:{show:true,formatter:'MA20 {c}',fontSize:8,color:'#1e90ff',offset:[0,0]}},
      {name:'量',type:'bar',xAxisIndex:1,yAxisIndex:1,data:vols,
       itemStyle:{color:function(p){var v=vals[p.dataIndex];return v[2]>=v[0]?up:dn}}},
      {name:'MACD',type:'bar',xAxisIndex:2,yAxisIndex:2,data:macd,
       itemStyle:{color:function(p){return macd[p.dataIndex]>=0?up:dn}}},
      {name:'DIF',type:'line',xAxisIndex:2,yAxisIndex:2,data:dif,smooth:true,lineStyle:{width:1,color:'#ffffff'},symbol:'none'},
      {name:'DEA',type:'line',xAxisIndex:2,yAxisIndex:2,data:dea,smooth:true,lineStyle:{width:1,color:'#ffa502'},symbol:'none'}
    ],
    tooltip:{trigger:'axis',axisPointer:{type:'cross'},
      formatter:function(ps){
        var d=ps[0].axisValue;var s='<b>'+d+'</b><br/>';
        for(var i=0;i<ps.length;i++){var p=ps[i];if(!p||p.value===undefined||p.value===null)continue;
          var v=Array.isArray(p.value)?p.value:[p.value];
          s+='<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+p.color+';margin-right:4px"></span>'+p.seriesName+': '+v.map(function(x){return typeof x==='number'?x.toFixed(2):x}).join('/')+'<br/>';}
        return s;
      }},
    backgroundColor:'transparent'
  };
  chart.setOption(option);
}

// 分时图
function renderFLine(code){
  var dom=document.getElementById('chf-'+code);
  var it=IT[code];if(!it||it.length<2){dom.innerHTML='<div style="color:#484f58;text-align:center;padding:40px">无分时数据</div>';return}
  var times=[],prices=[],vols=[];
  it.forEach(function(r){
    times.push(r[0]);
    prices.push(r[1]);
    vols.push(r[2]*100);
  });
  var k=KL[code],preClose=k&&k.length>1?k[k.length-2][2]:prices[0];

  var chart=echarts.init(dom);
  chartInst[code+'_f']=chart;
  var upColor='#f85149',downColor='#3fb950';
  var clr=prices[prices.length-1]>=preClose?upColor:downColor;

  var option={
    grid:[{left:8,right:8,top:8,height:'65%'},{left:8,right:8,top:'78%',height:'18%'}],
    xAxis:[{type:'category',data:times,gridIndex:0,axisLabel:{fontSize:7,color:'#6e7681',interval:Math.floor(times.length/5)},axisLine:{lineStyle:{color:'#1c1c2a'}},axisTick:{show:false}},
           {type:'category',data:times,gridIndex:1,axisLabel:{show:false},axisLine:{lineStyle:{color:'#1c1c2a'}},axisTick:{show:false}}],
    yAxis:[{type:'value',gridIndex:0,scale:true,splitLine:{lineStyle:{color:'#1c1c2a'}},axisLabel:{fontSize:8,color:'#6e7681',formatter:function(v){return v.toFixed(1)}}},
           {type:'value',gridIndex:1,splitLine:{show:false},axisLabel:{show:false}}],
    series:[
      {name:'分时',type:'line',xAxisIndex:0,yAxisIndex:0,data:prices,lineStyle:{width:1.5,color:clr},symbol:'none',
       areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:clr+'44'},{offset:1,color:'transparent'}])},
       markLine:{silient:true,data:[{yAxis:preClose,label:{formatter:'昨收 '+preClose.toFixed(2),fontSize:8},lineStyle:{color:'#6e7681',type:'dashed'}}]}},
      {name:'量',type:'bar',xAxisIndex:1,yAxisIndex:1,data:vols,
       itemStyle:{color:function(p){return prices[p.dataIndex]>=preClose?upColor+'44':downColor+'44'}}}
    ],
    backgroundColor:'transparent'
  };
  chart.setOption(option);
}

// 窗口大小变化
window.addEventListener('resize',function(){
  for(var k in chartInst){if(chartInst[k])chartInst[k].resize();}
});
</script>
