<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>黄河旋风 日K</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:12px}
.hdr{text-align:center;margin-bottom:10px}
.hdr h1{font-size:18px;color:#58a6ff}.hdr p{font-size:10px;color:#8b949e}
.stats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.stat{background:#161b22;border-radius:6px;padding:8px 8px;flex:1;min-width:calc(33%-6px);text-align:center}
.stat .val{font-size:15px;font-weight:700}
.stat .lbl{font-size:9px;color:#8b949e;margin-top:1px}
svg{display:block;width:100%;max-width:500px;margin:0 auto}
.footer{text-align:center;font-size:9px;color:#484f58;margin-top:10px}
</style>
</head>
<body>
<div class="hdr"><h1>黄河旋风 600172</h1><p>日K线 | 30交易日 | 2026-06-19</p></div>
<div class="stats" id="s"></div>
<div id="c"></div>
<div class="footer">数据:Sina | 仅供参考 | 阿财</div>
<script>
var KL=[["05-08", 8.75, 8.89, 8.97, 8.68, 8441], ["05-11", 9.78, 9.78, 9.78, 9.78, 7059], ["05-12", 10.33, 10.76, 10.76, 9.9, 35843], ["05-13", 10.92, 11.84, 11.84, 10.91, 32980], ["05-14", 11.98, 11.83, 12.48, 11.55, 37439], ["05-15", 11.59, 11.06, 12.2, 10.97, 28268], ["05-18", 10.77, 11.04, 11.98, 10.77, 21481], ["05-19", 11.01, 10.82, 11.08, 10.43, 15860], ["05-20", 10.73, 10.7, 11.11, 10.5, 12459], ["05-21", 10.71, 9.99, 10.9, 9.95, 14231], ["05-22", 10.8, 10.99, 10.99, 10.8, 7842], ["05-25", 11.5, 12.09, 12.09, 11.16, 18901], ["05-26", 12.74, 13.3, 13.3, 12.6, 30952], ["05-27", 13.3, 13.27, 13.69, 13.0, 32256], ["05-28", 13.22, 14.6, 14.6, 13.2, 16749], ["05-29", 16.0, 14.08, 16.06, 13.93, 41585], ["06-01", 14.1, 13.47, 14.45, 13.31, 25841], ["06-02", 13.44, 13.9, 14.54, 12.91, 28803], ["06-03", 13.5, 15.04, 15.29, 13.5, 33421], ["06-04", 14.24, 14.48, 14.8, 14.06, 27737], ["06-05", 14.27, 13.43, 14.65, 13.26, 22983], ["06-08", 12.35, 12.56, 13.17, 12.35, 16709], ["06-09", 12.85, 12.85, 12.94, 12.29, 15853], ["06-10", 12.75, 12.12, 13.22, 11.89, 16507], ["06-11", 12.0, 11.82, 12.5, 11.65, 14110], ["06-12", 12.08, 11.83, 13.0, 11.7, 27353], ["06-15", 11.86, 12.42, 12.48, 11.28, 21396], ["06-16", 12.5, 12.9, 13.13, 12.29, 21496], ["06-17", 12.9, 13.3, 13.54, 12.7, 21926], ["06-18", 13.8, 14.01, 14.63, 13.78, 34283]];
var cs=KL.map(function(r){return r[2]});
var p=cs[cs.length-1];
var m5=cs.slice(-5).reduce(function(a,b){return a+b})/5;
var m10=cs.slice(-10).reduce(function(a,b){return a+b})/10;
var m20=cs.slice(-20).reduce(function(a,b){return a+b})/20;
var c5=(p/cs[cs.length-5]-1)*100;
var c20=(p/cs[cs.length-20]-1)*100;

document.getElementById("s").innerHTML=
'<div class="stat"><div class="val" style="color:#3fb950">'+p.toFixed(2)+'</div><div class="lbl">现价</div></div>'+
'<div class="stat"><div class="val" style="color:'+(c5>0?'#3fb950':'#f85149')+'">'+(c5>0?'+':'')+c5.toFixed(1)+'%</div><div class="lbl">5日</div></div>'+
'<div class="stat"><div class="val">'+m5.toFixed(2)+'</div><div class="lbl">MA5</div></div>'+
'<div class="stat"><div class="val">'+m10.toFixed(2)+'</div><div class="lbl">MA10</div></div>'+
'<div class="stat"><div class="val">'+m20.toFixed(2)+'</div><div class="lbl">MA20</div></div>'+
'<div class="stat"><div class="val" style="color:'+(c20>0?'#3fb950':'#f85149')+'">'+(c20>0?'+':'')+c20.toFixed(1)+'%</div><div class="lbl">20日</div></div>';

function ma(a,n){var s=0,c=0;for(var i=Math.max(0,a.length-n);i<a.length;i++){s+=a[i];c++}return c?s/c:0}
var ma5=[],ma10=[],ma20=[];
for(var i=0;i<cs.length;i++){ma5.push(ma(cs.slice(0,i+1),5));ma10.push(ma(cs.slice(0,i+1),10));ma20.push(ma(cs.slice(0,i+1),20))}
var W=470,H=270,PL=48,PR=10,PT=18,PB=26,CW=W-PL-PR,CH=H-PT-PB;
var hi=0,lo=1e9,mxv=0;
KL.forEach(function(r){if(r[3]>hi)hi=r[3];if(r[4]<lo)lo=r[4];if(r[5]>mxv)mxv=r[5]});
hi*=1.03;lo*=0.97;var rg=hi-lo;
function px(i){return PL+i*CW/(KL.length-1)}
function py(p){return PT+(hi-p)/rg*CH}
var s='<svg viewBox="0 0 '+W+' '+(H+55)+'" width="100%" style="max-width:480px">';
s+='<rect width="'+W+'" height="'+(H+55)+'" fill="#0d1117"/>';
for(var i=0;i<=4;i++){var y=PT+i*CH/4;s+='<line x1="'+PL+'" y1="'+y+'" x2="'+(W-PR)+'" y2="'+y+'" stroke="#21262d"/>';s+='<text x="'+(PL-5)+'" y="'+(y+4)+'" text-anchor="end" font-size="9" fill="#8b949e">'+(hi-i*rg/4).toFixed(1)+'</text>'}
for(var i=0;i<KL.length;i++){var r=KL[i],x=px(i),o=py(r[1]),c=py(r[2]),h=py(r[3]),l=py(r[4]);var cl=r[2]>=r[1]?'#3fb950':'#f85149';s+='<line x1="'+x+'" y1="'+h+'" x2="'+x+'" y2="'+l+'" stroke="'+cl+'"/>';var bw=Math.max(1.5,CW/KL.length*.75),bh=Math.abs(c-o)||1,by=Math.min(c,o);s+='<rect x="'+(x-bw/2)+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="'+cl+'"/>';if(i%5===0)s+='<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-size="8" fill="#8b949e">'+r[0]+'</text>'}
function dm(v,c){var d='';for(var i=0;i<v.length;i++){if(v[i]===0)continue;d+=(d?'L':'M')+px(i)+' '+py(v[i])}if(d)s+='<path d="'+d+'" fill="none" stroke="'+c+'" stroke-width="1.5"/>'}
dm(ma5,'#ff6b35');dm(ma10,'#ffa502');dm(ma20,'#1e90ff');
s+='<text x="'+(W-PR-10)+'" y="14" font-size="9" fill="#ff6b35">MA5</text><text x="'+(W-PR-50)+'" y="14" font-size="9" fill="#ffa502">MA10</text><text x="'+(W-PR-90)+'" y="14" font-size="9" fill="#1e90ff">MA20</text>';
s+='<text x="'+PL+'" y="'+(H+12)+'" font-size="8" fill="#8b949e">成交量</text>';
var VH=48;mxv=mxv||1;
for(var i=0;i<KL.length;i++){var r=KL[i],vh=r[5]/mxv*(VH-8);var bw=Math.max(1.5,CW/KL.length*.75);s+='<rect x="'+(px(i)-bw/2)+'" y="'+(H+10+VH-vh)+'" width="'+bw+'" height="'+vh+'" fill="'+(r[2]>=r[1]?'#3fb95044':'#f8514944')+'"/>'}
s+='</svg>';
document.getElementById("c").innerHTML=s;
</script>
</body>
</html>
