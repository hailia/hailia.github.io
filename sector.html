*{margin:0;padding:0;box-sizing:border-box}

.up{color:#f85149}.dn{color:#3fb950}

.pie-box{flex:1;min-height:380px}
.chart-box{width:100%;height:100%}
.detail{display:none;padding:6px 14px 10px 20px;background:#0c0c14;border-top:1px solid #1c1c2a}
.detail.open{display:block}
.detail .ds{display:flex;align-items:center;padding:4px 0;font-size:11px;gap:6px}
.detail .ds .dnm{flex:1}
.detail .ds .dchg{min-width:56px;text-align:right;font-weight:600}
.tabs{display:flex;gap:8px;margin-bottom:8px;padding:0 14px}
.tab{padding:4px 0;font-size:11px;cursor:pointer;color:#6e7681;border-bottom:2px solid transparent}
.tab.act{color:#58a6ff;border-bottom-color:#58a6ff}
@media(max-width:768px){

  .pie{min-height:320px}
}
</style>

var sortKey='chg';
function sortBy(k){
  sortKey=k;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('act',(k==='chg'&&i===0)||(k==='vol'&&i===1))});
  render();
}

function render(){
  var sorted=DATA.slice().sort(function(a,b){
    return sortKey==='chg'?b.avg_chg-a.avg_chg:b.total_amt-a.total_amt;
  });
  var body=document.getElementById('tbl-body');
  body.innerHTML='';
  sorted.forEach(function(r,i){
    var chg=r.avg_chg;
    var row=document.createElement('div');
    row.className='tbl-row';
    row.onclick=function(){toggleDetail(row,r.name);};
    var topStock=r.stocks[0];
    row.innerHTML=
      '<div class="r">'+(i+1)+'</div>'+
      '<div class="bar" style="background:'+r.color+'"></div>'+
      '<div class="name">'+r.name+'</div>'+
      '<div class="cnt">'+r.count+'</div>'+
      '<div class="chg '+(chg>=0?'up':'dn')+'">'+(chg>=0?'+':'')+chg.toFixed(1)+'%'+(r.limit_up?' 🔥'+r.limit_up:'')+'</div>'+
      '<div class="vol">'+r.total_amt.toFixed(1)+'</div>'+
      '<div class="top">'+topStock.name+' '+(topStock.chg>=0?'+':'')+topStock.chg.toFixed(1)+'%</div>';
    body.appendChild(row);

    var detail=document.createElement('div');
    detail.className='detail';
    detail.id='det-'+r.name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'');
    var ds='';
    r.stocks.forEach(function(s){
      ds+='<div class="ds"><span style="color:#484f58;font-size:10px">'+s.code+'</span><span class="dnm">'+s.name+'</span><span class="dchg '+(s.chg>=0?'up':'dn')+'">'+(s.chg>=0?'+':'')+s.chg.toFixed(1)+'%</span></div>';
    });
    detail.innerHTML=ds;
    body.appendChild(detail);
  });
}

var openDet=null;
function toggleDetail(row, name){
  var id='det-'+name.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g,'');
  var det=document.getElementById(id);
  if(openDet&&openDet!==det){openDet.classList.remove('open');}
  if(det.classList.contains('open')){det.classList.remove('open');openDet=null;}
  else{det.classList.add('open');openDet=det;}
}

  var option={
    tooltip:{trigger:'item',formatter:'{b}: {c}亿 ({d}%)'},
    series:[{type:'pie',radius:['30%','70%'],center:['50%','50%'],data:pieData,
      label:{fontSize:9,color:'#8b949e',formatter:'{b}\n{d}%'},
      emphasis:{label:{fontSize:13,fontWeight:'bold'}}}],
    backgroundColor:'transparent'
  };
  chart.setOption(option);
  window.addEventListener('resize',function(){chart.resize();});
})();

render();
</script>
