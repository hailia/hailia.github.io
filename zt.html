.tbl-row{display:flex;align-items:center;padding:6px 10px;border-bottom:1px solid #15151f;font-size:11px;gap:3px}

.tbl-row .n{flex:1;font-weight:500}
.tbl-row .p{min-width:52px;text-align:right;font-weight:600;color:#f85149}

.tbl-row .t{min-width:34px;text-align:center;font-size:10px;color:#484f58}

.tbl-row .b{min-width:22px;text-align:center;font-size:10px}
.tbl-row .b2{background:#f8514933;color:#f85149;border-radius:4px;padding:1px 6px;font-weight:600}
.tbl-row .b3{background:#ff6b3533;color:#ff6b35;border-radius:4px;padding:1px 6px;font-weight:600}
.side{display:flex;flex-direction:column;gap:8px}
.side-box{background:#12121a;border-radius:10px;padding:8px}
.side-box .stitle{font-size:11px;font-weight:600;color:#8b949e;margin-bottom:6px}
.chart-box{width:100%;height:280px}
.tier-item{display:flex;align-items:center;padding:3px 0;font-size:10px;gap:4px;border-bottom:1px solid #15151f}
.tier-item .tn{flex:1}.tier-item .tp{color:#f85149;font-weight:600}

.early-item .en{flex:1}.early-item .ev{color:#8b949e;font-size:9px}
.tabs{display:flex;gap:2px;margin:0 10px 8px}
.tab{padding:4px 12px;border-radius:6px;font-size:10px;cursor:pointer;color:#6e7681;background:#14141e}
.tab.act{background:#1a1a2e;color:#58a6ff}
@media(max-width:768px){

  .ov-card{min-width:60px;padding:8px 10px}
}
</style>

var sortKey='time';

function sortBy(k){sortKey=k;document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('act',(k==='time'&&i===0)||(k==='board'&&i===1)||(k==='amount'&&i===2))});render();}

function render(){
  var sorted=DATA.stocks.slice();
  if(sortKey==='time')sorted.sort(function(a,b){return a.first_time.localeCompare(b.first_time)});
  else if(sortKey==='board')sorted.sort(function(a,b){return b.board_count-a.board_count||a.first_time.localeCompare(b.first_time)});
  else sorted.sort(function(a,b){return b.amount-a.amount});
  var body=document.getElementById('tbl-body');body.innerHTML='';
  sorted.forEach(function(s){
    var bc=s.board_count>=5?'b3':s.board_count>=2?'b2':'';
    var bi=s.board_count>=2?'<span class="'+bc+'">'+s.board_count+'板</span>':'<span style="color:#484f58">首</span>';
    var first=s.first_time.slice(0,2)+':'+s.first_time.slice(2,4);
    var oz=s.open_count>0?'炸'+s.open_count:'';
    var row=document.createElement('div');row.className='tbl-row';
    row.innerHTML='<div class="c">'+s.code+'</div><div class="n">'+s.name+'</div><div class="p">+'+s.pct.toFixed(1)+'%</div><div class="t">'+first+(oz?'<span style="color:#f85149;font-size:9px">'+oz+'</span>':'')+'</div><div class="b">'+bi+'</div><div class="s"><span class="reason-tag">'+s.reason+'</span></div><div class="v">'+s.turnover.toFixed(1)+'%</div>';
    body.appendChild(row);
  });
}

// 饼图
(function(){
  var chart=echarts.init(document.getElementById('sector-pie'));
  chart.setOption({
    tooltip:{trigger:'item',formatter:'{b}: {c}只'},

      label:{fontSize:8,color:'#8b949e'}}],
    backgroundColor:'transparent'
  });
  window.addEventListener('resize',function(){chart.resize();});
})();

// 涨停驱动
(function(){
  var el=document.getElementById('banner-box');
  DATA.reasons.forEach(function(r){
    el.innerHTML+='<div class="bitem">'+r.name+' ('+r.count+'票)</div>';
  });
  if(!DATA.reasons.length)el.innerHTML='<div style="color:#484f58;font-size:10px">--</div>';
})();

// 连板梯队
(function(){
  var el=document.getElementById('tier-list');
  DATA.tiers.forEach(function(t){
    var h='<div style="font-size:11px;font-weight:600;color:#ffa502;margin:6px 0 2px">'+t.level+'连板 ('+t.count+'只)</div>';
    t.stocks.forEach(function(s){h+='<div class="tier-item"><span class="tn">'+s.name+'</span><span class="tp">+'+s.pct.toFixed(1)+'%</span></div>';});
    el.innerHTML+=h;
  });
  if(!DATA.tiers.length)el.innerHTML='<div style="color:#484f58;font-size:10px">今日无连板</div>';
})();

// 早封板
(function(){
  var el=document.getElementById('early-list');
  DATA.early_sealed.forEach(function(s){
    var t=s.first_time.slice(0,2)+':'+s.first_time.slice(2,4);
    el.innerHTML+='<div class="early-item"><span class="en">'+s.name+'</span><span class="ev">'+t+' 封'+s.seal_money.toFixed(1)+'亿</span></div>';
  });
  if(!DATA.early_sealed.length)el.innerHTML='<div style="color:#484f58;font-size:10px">无</div>';
})();

render();
